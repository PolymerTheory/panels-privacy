name: Update Comic Feeds

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Also allow manual trigger from GitHub Actions tab
    inputs:
      smbc_max_walk:
        description: 'Max SMBC pages to walk per run (use 2000+ for initial backfill)'
        required: false
        default: '200'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit updated JSON files back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update comic feeds
        env:
          SMBC_MAX_WALK: ${{ github.event.inputs.smbc_max_walk || '200' }}
        run: python scripts/update_feeds.py

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Only commit if something changed
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update comic feeds [skip ci]"
            git push
          fi
