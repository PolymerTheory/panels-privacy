name: Update Comic Feeds

on:
  schedule:
    # Run every 2 hours
    - cron: '0 */2 * * *'
  workflow_dispatch:
    # Also allow manual trigger from GitHub Actions tab
    inputs:
      smbc_max_walk:
        description: 'Max SMBC pages to walk per run (use 2000+ for initial backfill)'
        required: false
        default: '200'
      commitstrip_max_fetch:
        description: 'Max CommitStrip post pages to fetch per run (use 2000+ to fill archive quickly)'
        required: false
        default: '200'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit updated JSON files back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update comic feeds
        env:
          SMBC_MAX_WALK: ${{ github.event.inputs.smbc_max_walk || '200' }}
          COMMITSTRIP_MAX_FETCH: ${{ github.event.inputs.commitstrip_max_fetch || '200' }}
        run: python scripts/update_feeds.py

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Only commit if something changed
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update comic feeds [skip ci]"
            # Retry push up to 3 times — GitHub occasionally returns
            # "fatal error in commit_refs" due to transient backend issues.
            for attempt in 1 2 3; do
              echo "Push attempt $attempt…"
              git push && break
              if [ $attempt -lt 3 ]; then
                echo "Push failed, retrying in 30s…"
                sleep 30
              else
                echo "Push failed after 3 attempts"
                exit 1
              fi
            done
          fi
